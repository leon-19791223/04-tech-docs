<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Z-DBMate 部署工具集{% endblock %}</title>
<link rel="stylesheet" href="http://127.0.0.1:8080/shared/brand.css">
</head>
<body>

<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-badge"><span class="sb-icon">&#x2699;</span><span>v2.0</span></div>
    <h1>Z-DBMate 工具集</h1>
    <p>GaussDB OLTP 部署</p>
  </div>
  <nav class="sb-nav">
    <div class="sb-label">部署管理</div>
    <a href="/" class="{% if request.path == '/' %}active{% endif %}"><span class="ni">&#x1F4CA;</span> 仪表盘</a>
    <a href="/precheck" class="{% if request.path == '/precheck' %}active{% endif %}"><span class="ni">&#x2705;</span> 环境预检</a>
    <a href="/deploy" class="{% if request.path == '/deploy' %}active{% endif %}"><span class="ni">&#x1F680;</span> 一键部署</a>
    <a href="/monitor" class="{% if request.path == '/monitor' %}active{% endif %}"><span class="ni">&#x1F4C8;</span> 部署监控</a>
    <div class="sb-label">规范</div>
    <a href="/checklist" class="{% if request.path == '/checklist' %}active{% endif %}"><span class="ni">&#x1F4CB;</span> 检查清单</a>
    <a href="/guide" class="{% if request.path == '/guide' %}active{% endif %}"><span class="ni">&#x1F4D6;</span> GaussDB部署指南</a>
  </nav>
  <div style="padding:8px 16px;border-top:1px solid rgba(255,255,255,0.06);">
    <a href="http://127.0.0.1:8080" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;text-decoration:none;font-size:11px;color:rgba(255,255,255,0.4);transition:all 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">&#x2190; 返回门户</a>
  </div>
  <div class="sb-footer">&copy; 2026 &middot; v2.0</div>
</div>

<div class="main">
  <div class="topbar">
    <div><h2>{% block page_title %}仪表盘{% endblock %}</h2></div>
  </div>
  <div class="page-wrap">{% block content %}{% endblock %}</div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
