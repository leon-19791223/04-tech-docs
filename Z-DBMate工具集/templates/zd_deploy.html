{% extends "base.html" %}
{% block page_title %}一键部署{% endblock %}
{% block content %}

<div class="two">
  <div class="card">
    <div class="card-hdr"><span class="card-title"><span class="ti">&#x1F4CB;</span> 选择部署场景</span></div>
    {% for s in scenarios %}
    <label class="scenario-option" data-id="{{ s.id }}" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--rs);border:1px solid var(--g100);margin-bottom:8px;cursor:pointer;transition:all var(--ts);">
      <input type="radio" name="scenario" value="{{ s.id }}" {% if loop.first %}checked{% endif %} style="accent-color:var(--accent);">
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;">{{ s.label }}</div>
        <div style="font-size:12px;color:var(--g500);">配置: {{ s.conf }}</div>
      </div>
    </label>
    {% endfor %}
  </div>

  <div class="card">
    <div class="card-hdr"><span class="card-title"><span class="ti">&#x2699;</span> 部署配置</span></div>
    <div style="margin-bottom:16px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;">执行模式</div>
      {% for m in modes %}
      <label style="display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;">
        <input type="radio" name="mode" value="{{ m.id }}" {% if loop.first %}checked{% endif %} style="accent-color:var(--accent);">
        <div>
          <div style="font-weight:600;font-size:14px;">{{ m.label }}</div>
          <div style="font-size:12px;color:var(--g500);">{{ m.desc }}</div>
        </div>
      </label>
      {% endfor %}
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;">密码（可选）</div>
      <input id="deploy-pass" type="password" placeholder="留空则手动输入" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--g200);font-size:13px;">
    </div>

    <div style="margin-bottom:16px;padding:12px;background:var(--warning-bg, #FFF3E0);border-radius:var(--rs);font-size:13px;color:var(--warning);">
      &#x26A0; 部署前请确保配置文件已修改:<br>
      <code style="font-size:12px;">vi conf/user_edit_file.conf</code>
    </div>

    <button class="btn btn-success" style="width:100%;justify-content:center;font-size:15px;padding:12px;" onclick="startDeploy()">&#x1F680; 开始部署</button>
    <a href="/monitor" class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px;">&#x1F4C8; 查看部署进度</a>
  </div>
</div>

<div id="deploy-result" style="display:none;">
  <div class="card">
    <div class="card-hdr"><span class="card-title"><span class="ti">&#x2705;</span> 部署已启动</span></div>
    <div id="deploy-info" style="font-size:14px;line-height:1.8;"></div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function startDeploy(){
  var scenario = document.querySelector('input[name="scenario"]:checked').value;
  var mode = document.querySelector('input[name="mode"]:checked').value;
  var pass = document.getElementById('deploy-pass').value;

  fetch('/api/deploy/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({scenario: scenario, mode: mode, password: pass})
  }).then(function(r){ return r.json(); }).then(function(data){
    document.getElementById('deploy-result').style.display = 'block';
    document.getElementById('deploy-info').innerHTML =
      '模式: <strong>' + mode + '</strong><br>' +
      '场景: <strong>' + scenario + '</strong><br>' +
      '状态: <span class="tag tg-grn">已启动</span><br>' +
      '日志: <code>' + data.log_file + '</code><br><br>' +
      '<a href="/monitor" class="btn btn-pri">查看监控</a>';
  });
}
</script>
{% endblock %}
