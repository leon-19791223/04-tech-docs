# ============================================================
# Z-DBMate 部署配置文件模板
# 版本: v2.0 (适配 GaussDB 25.1.32 官方规范)
#
# 说明:
#   1. cp user_edit_file.template.conf user_edit_file.conf
#   2. vi user_edit_file.conf 修改实际IP/路径
#   3. bash scripts/deploy.sh
#
# 路径规范（官方推荐）:
#   生产环境: /opt/cloud, /opt/gaussdb, /opt/sftphome, /opt/backup, /opt/docker, /opt/influxdb
#   测试环境: /data/cloud, /data/gaussdb, /data/sftphome, /data/backup, /data/docker, /data/influxdb
#   各目录需独立LV挂载
# ============================================================

[user_edit]
# ============================================================
# --- 1. SSH配置 ---
# ============================================================
ssh_port = 22

# ============================================================
# --- 2. 节点IP配置 ---
# ============================================================
# TPOPS节点（单节点填1个，HA填3个）
tpops_node1_ip = 192.168.0.1
# tpops_node2_ip = 192.168.0.2    # HA场景启用
# tpops_node3_ip = 192.168.0.3    # HA场景启用

# GaussDB实例节点（集中式主备版一般为3节点）
gaussdb_node1_ip = 192.168.0.11
gaussdb_node2_ip = 192.168.0.12
gaussdb_node3_ip = 192.168.0.13

# InfluxDB（TPOPS监控存储，单节点填1个即可）
influxdb_ip1 = 192.168.0.1
# influxdb_ip2 = 192.168.0.2     # HA场景启用

# SFTP（安装包分发服务，单节点填1个即可）
sftp_ip1 = 192.168.0.1
# sftp_ip2 = 192.168.0.2         # HA场景启用

# NTP时间同步服务器（可选）
# ntp_server = ntp.aliyun.com

# ============================================================
# --- 3. 路径配置 ---
#   根据实际磁盘挂载规划修改
#   生产环境推荐: /opt 前缀
#   测试环境可用: /data 前缀
# ============================================================
# GaussDB安装路径
gauss_path = /opt/gaussdb

# TPOPS微服务主路径
main_path = /opt/cloud

# 日志路径
log_path = /opt/cloud/logs

# SFTP文件服务路径
sftp_path = /opt/sftphome

# InfluxDB时序数据库路径
influx_path = /opt/influxdb

# Docker容器路径
docker_path = /opt/docker

# 备份路径
backup_path = /opt/backup

# ============================================================
# --- 4. 端口配置 ---
# ============================================================
# TPOPS Web访问端口
tpops_web_port = 8002

# GaussDB数据库端口
gaussdb_port = 40080

# ============================================================
# --- 5. service用户配置 ---
#   需与系统创建的用户ID一致
# ============================================================
service_user_id = 1010
service_group_id = 1010

# ============================================================
# --- 6. 功能开关 ---
# ============================================================
# 是否卸载所有组件后再安装（yes/no）
uninstall_all = no

# 是否使用cgroup（no-不使用）
use_cgroup = no

# ============================================================
# --- 7. 安装包配置 ---
# ============================================================
# Z-DBMate工具包路径（默认即可）
zdmate_path = /data/Z-DBMate

# 系统镜像ISO路径（用于本地yum源）
os_image_path = /data/Z-DBMate/install/package/Kylin-Server-V10.iso

# 安装包存放路径
package_path = /data/Z-DBMate/apps/tpops

# ============================================================
# --- 8. MD5校验文件路径 ---
# ============================================================
# 数据库团队提供的MD5校验文件
md5_checksum_file = /data/Z-DBMate/source_md5_checksum.txt

[conf]
# ============================================================
# 连接配置（TPOPS Web登录信息）
# ============================================================
tpops_ip = 192.168.0.1
gaussdb_ip = 192.168.0.11
port = 40080
