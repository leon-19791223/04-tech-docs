# ============================================================
# Z-DBMate 部署配置文件模板
# 说明: 根据实际环境修改 [user_edit] 部分的IP和路径
# 使用: cp user_edit_file.template.conf user_edit_file.conf
#       然后编辑 user_edit_file.conf
# ============================================================

[user_edit]
# --- 节点IP配置 ---
# TPOPS节点IP（单节点写一个，HA写三个）
tpops_ip = 26.x.x.41
# tpops_ip = 26.x.x.42   # HA场景启用
# tpops_ip = 26.x.x.43   # HA场景启用

# GaussDB节点IP（三节点）
gaussdb_ip = 26.x.x.44
gaussdb_ip = 26.x.x.45
gaussdb_ip = 26.x.x.46

# --- 路径配置 ---
tpops_home = /data/tpops
gaussdb_app_path = /data/gaussdb/app
gaussdb_data_path = /data/gaussdb/data
gaussdb_log_path = /data/gaussdb/log
gaussdb_tmp_path = /data/gaussdb/tmp

# --- 端口配置 ---
tpops_web_port = 8002
gaussdb_port = 40080

# --- service用户ID（与系统创建保持一致） ---
service_user_id = 1010
service_group_id = 1010

# --- 镜像配置 ---
os_image_path = /data/Z-DBMate/install/package/Kylin-Server-V10.iso

[conf]
tpops_ip = 26.x.x.41
gaussdb_ip = 26.x.x.44
gaussdb_ip = 26.x.x.45
gaussdb_ip = 26.x.x.46
port = 40080
