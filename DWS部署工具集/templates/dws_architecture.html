{% extends "base.html" %}
{% block title %}架构 · DWS{% endblock %}
{% block content %}

<style>
.ab{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.ab .as{padding:7px 18px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--t2);transition:.15s}
.ab .as:hover{border-color:var(--ac);color:var(--ac)}
.ab .as.on{background:var(--ac-bg);color:var(--ac);border-color:var(--ac-bd);box-shadow:0 0 0 1px var(--ac-bd)}
.ab .sp{width:1px;height:20px;background:var(--bd)}
.ab input{width:52px;padding:6px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--tx);text-align:center;font-size:12px;font-weight:700}
.ab input:focus{outline:none;border-color:var(--ac)}
.ab .tgl{font-size:12px;font-weight:600;cursor:pointer;padding:7px 16px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--t2);transition:.15s}
.ab .tgl:hover,.ab .tgl.on{border-color:var(--ac);color:var(--ac);background:var(--ac-bg)}
.hw-r{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.hw-c{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:10px 16px;font-size:11.5px;display:flex;align-items:center;gap:10px;transition:.15s}
.hw-c:hover{border-color:rgba(255,255,255,.15)}
.hw-c .d{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.hw-c .d.c{background:var(--ac)}.hw-c .d.d{background:var(--pr)}.hw-c .d.a{background:var(--gr)}
.hw-c b{color:var(--tx);font-weight:600}
</style>

<div class="stats">
    <div class="stat"><div class="si blue">⊞</div><div><div class="sn" id="stN">-</div><div class="sl">物理节点</div></div></div>
    <div class="stat"><div class="si green">◈</div><div><div class="sn" id="stR">-</div><div class="sl">角色总数</div></div></div>
    <div class="stat"><div class="si purple">⊡</div><div><div class="sn" id="stM">-</div><div class="sl">部署模式</div></div></div>
    <div class="stat"><div class="si amber">◎</div><div><div class="sn" id="stS">UAT</div><div class="sl">当前场景</div></div></div>
</div>

<div class="ab">
    <span style="font-size:12px;font-weight:600;color:var(--t2);">场景</span>
    {% for k,l in [('dev','DEV开发'),('sit','SIT测试'),('uat','UAT验收'),('preprod','生产2+5'),('expand','扩容2+8')] %}
    <button class="as {{ 'on' if k=='uat' }}" data-s="{{ k }}">{{ l }}</button>{% endfor %}
    <span class="sp"></span>
    <span style="font-size:11px;color:var(--t2);">CN</span><input type="number" id="cn" value="2" min="1">
    <span style="font-size:11px;color:var(--t2);">DN</span><input type="number" id="dn" value="3" min="2">
    <span class="sp"></span>
    <button class="tgl" id="coBtn" data-co="0">角色分离</button>
</div>

<div class="hw-r" id="hwPanel"></div>

<div class="card" style="padding:6px;"><svg id="asvg" viewBox="0 0 1480 540" style="width:100%;display:block;min-height:420px;"></svg></div>

<div class="card" style="display:flex;gap:24px;padding:8px 16px;font-size:11.5px;align-items:center;">
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#58a6ff;"></span>OM 管理</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#3fb950;"></span>CN 协调</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#bc8cff;"></span>DN 数据</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#d29922;"></span>GTM 事务</span>
    <span style="margin-left:auto;font-size:11px;color:var(--t2);" id="legInfo"></span>
</div>

<script>
var RC={OM:'#58a6ff',CN:'#3fb950',DN:'#bc8cff',GTM:'#d29922'};
var BGS={OM:'rgba(88,166,255,.1)',CN:'rgba(63,185,80,.1)',DN:'rgba(188,140,255,.1)',GTM:'rgba(210,153,34,.1)'};
var RL={OM:'OM管理',CN:'Coordinator',DN:'DataNode',GTM:'GTM'},cd=null;

function load(s,cn,dn,co){
    var p=new URLSearchParams();if(s)p.set('scenario',s);if(cn)p.set('cn',cn);if(dn)p.set('dn',dn);if(co!==undefined)p.set('co_deploy',co?'1':'0');
    fetch('/api/architecture?'+p).then(function(r){return r.json()}).then(function(d){cd=d;draw(d);stats(d);hw(d);
        document.querySelectorAll('.as').forEach(function(b){b.classList.toggle('on',b.dataset.s===s)});
        document.getElementById('stS').textContent=(s||'uat').toUpperCase();
        document.getElementById('legInfo').textContent=d.total_nodes+' 物理节点 · '+d.nodes.length+' 角色'+(d.co_deploy?' · 合设':'');
    });
}
function draw(d){
    var ns=d.nodes,co=d.co_deploy,W=1480,H=540;
    var oms=ns.filter(function(n){return n.role==='OM'});
    var gts=co?ns.filter(function(n){return n.role==='GTM'}):ns.filter(function(n){return n.role==='GTM'&&!n.co_host});
    var cns=ns.filter(function(n){return n.role==='CN'}),dns=ns.filter(function(n){return n.role==='DN'});
    var h='<defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".4"/></filter>';
    Object.keys(RC).forEach(function(r){h+='<linearGradient id="g'+r+'"><stop offset="0%" stop-color="'+RC[r]+'" stop-opacity=".15"/><stop offset="100%" stop-color="'+RC[r]+'" stop-opacity=".05"/></linearGradient>'});
    h+='</defs>';

    var omSp=Math.min(240,(W-240)/Math.max(oms.length,1)),omSx=(W-omSp*(oms.length-1))/2,omY=38;
    var gtY=omY+(co?68:92),gtSp=Math.min(200,(W-240)/Math.max(gts.length,1)),gtSx=(W-gtSp*(gts.length-1))/2;
    var cnY=gtY+92,cnSp=Math.min(220,(W-160)/Math.max(cns.length,1)),cnSx=(W-cnSp*(cns.length-1))/2;
    var dpr=Math.max(5,Math.ceil(dns.length/Math.ceil(dns.length/6))),drs=[];
    for(var i=0;i<dns.length;i+=dpr)drs.push(dns.slice(i,i+dpr));
    var dbY=cnY+100,drH=82,th=dbY+drs.length*drH+12;

    h+='<rect x="0" y="26" width="'+W+'" height="'+(th-26)+'" rx="10" fill="none" stroke="rgba(255,255,255,.03)" stroke-width="1"/>';
    // Network planes
    h+='<rect x="8" y="28" width="'+(W-16)+'" height="18" rx="3" fill="#58a6ff" opacity=".04"/><text x="18" y="41" font-size="10" fill="#58a6ff" font-weight="700">管理平面</text><text x="'+(W-18)+'" y="41" text-anchor="end" font-size="9" fill="#484f58">GE · bond1 · active-backup</text>';
    h+='<rect x="8" y="'+(cnY+50)+'" width="'+(W-16)+'" height="18" rx="3" fill="#f85149" opacity=".04"/><text x="18" y="'+(cnY+63)+'" font-size="10" fill="#f85149" font-weight="700">业务平面</text><text x="'+(W-18)+'" y="'+(cnY+63)+'" text-anchor="end" font-size="9" fill="#484f58">25GE · bond4 · 802.3ad</text>';
    // Layer labels
    [{x:14,y:omY+16,t:'OM 管理层',c:'#58a6ff'},{x:14,y:(co?gtY:gtY)+16,t:'GTM 事务层',c:'#d29922'},{x:14,y:cnY+16,t:'CN 协调层',c:'#3fb950'},{x:14,y:dbY+16,t:'DN 数据层',c:'#bc8cff'}].forEach(function(l){h+='<text x="'+l.x+'" y="'+l.y+'" font-size="9" fill="'+l.c+'" font-weight="700">'+l.t+'</text>'});
    // OM connections
    if(oms.length>=2)for(var i2=0;i2<oms.length-1;i2++){var x1=omSx+i2*omSp+70,x2=omSx+(i2+1)*omSp+70;h+='<line x1="'+x1+'" y1="'+(omY+24)+'" x2="'+x2+'" y2="'+(omY+24)+'" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3" opacity=".5"/>';}

    function node(n,x,y,w,sz){
        var c=RC[n.role]||'#8b949e',bg=BGS[n.role]||'rgba(255,255,255,.04)',ic=!!n.co_host,hh=ic?36:50;
        h+='<g filter="url(#sh)">';
        h+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+hh+'" rx="8" fill="'+bg+'" stroke="'+c+'" stroke-width="2"/>';
        if(ic){h+='<text x="'+(x+w/2)+'" y="'+(y+22)+'" text-anchor="middle" font-size="11" fill="'+c+'" font-weight="700">'+n.id+' (合设于 '+n.co_host+')</text>';}
        else{
            h+='<text x="'+(x+w/2)+'" y="'+(y+18)+'" text-anchor="middle" font-size="12" fill="#e6edf3" font-weight="700">'+(n.hostname||n.id)+'</text>';
            h+='<text x="'+(x+w/2)+'" y="'+(y+32)+'" text-anchor="middle" font-size="9" fill="#8b949e">'+RL[n.role]+'</text>';
            if(n.mgmt_ip)h+='<text x="'+(x+w/2)+'" y="'+(y+44)+'" text-anchor="middle" font-size="8" fill="#6e7681">'+n.mgmt_ip+'</text>';
        }
        h+='</g>';
    }
    var nw=130,bizY=cnY+60;
    oms.forEach(function(n,i){node(n,omSx+i*omSp,omY,nw);if(!co)h+='<line x1="'+(omSx+i*omSp+65)+'" y1="'+(omY+50)+'" x2="'+(gtSx+Math.min(i,gts.length-1)*gtSp+65)+'" y2="'+gtY+'" stroke="#484f58" stroke-width="1" stroke-dasharray="2,3" opacity=".3"/>'});
    if(!co)gts.forEach(function(n,i){node(n,gtSx+i*gtSp,gtY,nw)});
    cns.forEach(function(n,i){node(n,cnSx+i*cnSp,cnY,nw);if(dns.length)h+='<line x1="'+(cnSx+i*cnSp+65)+'" y1="'+(cnY+50)+'" x2="'+(dbY+65)+'" y2="'+dbY+'" stroke="#484f58" stroke-width="1" opacity=".1"/>'});
    drs.forEach(function(row,ri){var ry=dbY+ri*drH,sp2=Math.min(200,(W-140)/Math.max(row.length,1)),sx2=(W-sp2*(row.length-1))/2;row.forEach(function(n,ci){node(n,sx2+ci*sp2,ry,nw)});});
    if(oms.length>=2){var c1=omSx+65,c2=omSx+omSp+65;h+='<text x="'+((c1+c2)/2)+'" y="'+(omY+22)+'" text-anchor="middle" font-size="18" fill="#58a6ff" font-weight="800" filter="url(#glow)">⇄</text>';}
    document.getElementById('asvg').innerHTML=h;
}
function stats(d){document.getElementById('stN').textContent=d.total_nodes;document.getElementById('stR').textContent=d.nodes.length;document.getElementById('stM').textContent=d.co_deploy?'合设':'分离';}
function hw(d){var hw=d.hardware||{},ht='';if(hw.ctrl)ht+='<div class="hw-c"><span class="d c"></span><b>管控节点</b> '+hw.ctrl.cpu+' · '+hw.ctrl.ram+' · '+hw.ctrl.disk+' · '+hw.ctrl.raid+'</div>';if(hw.data)ht+='<div class="hw-c"><span class="d d"></span><b>数据节点</b> '+hw.data.cpu+' · '+hw.data.ram+' · '+hw.data.disk+' · '+hw.data.raid+'</div>';if(hw.common)ht+='<div class="hw-c"><span class="d a"></span><b>统一合设</b> '+hw.common.cpu+' · '+hw.common.ram+' · '+hw.common.disk+' · '+hw.common.raid+'</div>';document.getElementById('hwPanel').innerHTML=ht;}

document.querySelectorAll('.as').forEach(function(b){b.addEventListener('click',function(){load(b.dataset.s);});});
document.getElementById('cn').addEventListener('change',function(){load(null,this.value,document.getElementById('dn').value,document.getElementById('coBtn').dataset.co==='1');});
document.getElementById('dn').addEventListener('change',function(){load(null,document.getElementById('cn').value,this.value,document.getElementById('coBtn').dataset.co==='1');});
document.getElementById('coBtn').addEventListener('click',function(){var co=this.dataset.co==='1';this.dataset.co=co?'0':'1';this.textContent=co?'角色分离':'角色合设';this.classList.toggle('on',!co);load(null,document.getElementById('cn').value,document.getElementById('dn').value,!co);});
load('uat');
</script>
{% endblock %}
