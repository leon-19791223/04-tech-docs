; ========== 产品标识 ==========
[Product]
product_name          = GaussDB_DWS
cluster_name          = dwsuat
version               = 9.1.0

; ========== 部署配置 ==========
[DeployConfig]
install_mode          = new_cluster
auth_mode             = normal
deploy_mode           = normal
system_user           = root
software_path         = /opt/huawei
data_path             = /srv/BigData
topology              = topo2
cluster_deploy_mode   = Single_Cluster
az_mode               = Single_AZ

; ========== 容量规划 ==========
[Capacity]
total_data_gb         = 150000
retention_days        = 365
daily_increment_gb    = 1200
disks_per_node        = 6
memory_per_node_gb    = 509
cpu_per_node          = 96
disk_format_ratio     = 1.093
compression_threshold = 0.7

; ========== OMS 浮动 IP ==========
[OMSFloatIP]
oms_server            = 10.134.21.202
oms_web               = 10.134.21.203
lvs                   = 10.134.21.204

; ========== 节点列表 ==========
[Nodes]
node_count            = 3

; --- dwsuat0001 (OM) ---
dwsuat0001.role              = OM
dwsuat0001.mgmt_ip           = 10.134.21.190
dwsuat0001.mgmt_netmask      = 255.255.255.0
dwsuat0001.mgmt_gateway      = 10.134.21.1
dwsuat0001.biz_ip            = 10.134.21.190
dwsuat0001.biz_netmask       = 255.255.255.0
dwsuat0001.biz_gateway       = 10.134.21.1
dwsuat0001.om_ip             = 
dwsuat0001.om_netmask        = 255.255.255.0
dwsuat0001.cpu_cores         = 96
dwsuat0001.memory_gb         = 509

; --- dwsuat0002 (CN) ---
dwsuat0002.role              = CN
dwsuat0002.mgmt_ip           = 10.134.21.191
dwsuat0002.mgmt_netmask      = 255.255.255.0
dwsuat0002.mgmt_gateway      = 10.134.21.1
dwsuat0002.biz_ip            = 10.134.21.191
dwsuat0002.biz_netmask       = 255.255.255.0
dwsuat0002.biz_gateway       = 10.134.21.1
dwsuat0002.om_ip             = 
dwsuat0002.om_netmask        = 255.255.255.0
dwsuat0002.cpu_cores         = 96
dwsuat0002.memory_gb         = 509

; --- dwsuat0003 (CN) ---
dwsuat0003.role              = CN
dwsuat0003.mgmt_ip           = 10.134.21.192
dwsuat0003.mgmt_netmask      = 255.255.255.0
dwsuat0003.mgmt_gateway      = 10.134.21.1
dwsuat0003.biz_ip            = 10.134.21.192
dwsuat0003.biz_netmask       = 255.255.255.0
dwsuat0003.biz_gateway       = 10.134.21.1
dwsuat0003.om_ip             = 
dwsuat0003.om_netmask        = 255.255.255.0
dwsuat0003.cpu_cores         = 96
dwsuat0003.memory_gb         = 509

; ========== 操作系统 ==========
[OS]
version               = Kylin-V10-SP3
arch                  = ARM64
kernel_version        = 4.19.90-52.40.v2207.ky10.aarch64
python_version        = 3.8.5
iso_path              = /opt/Kylin-V10-SP2-aarch64.iso

; ========== 网络规划 ==========
[Network]
mgmt_bond             = bond1 (mode=1)
biz_bond              = bond4 (mode=4)
mtu                   = 1500
dns_servers           = 10.134.21.1
ntp_servers           = 10.134.21.190
domain                = jxbank.local
bandwidth_required    = 800

; ========== 存储规划 ==========
[Storage]
data_disks            = /dev/sdb,/dev/sdc,/dev/sdd,/dev/sde,/dev/sdf,/dev/sdg
disk_type             = HDD
raid_level            = RAID5
raid_controller       = SP686C
partition_scheme      = GPT
filesystem            = xfs
xfs_ftype             = 1

; ========== GaussDB MPPDB ==========
[GaussDB]
version               = 9.1.0
package_path          = /opt/GaussDB_MPPDB_9.1.0.zip
install_path          = /opt/huawei/Bigdata
data_path             = /data/gaussdb/data
wal_path              = /data/gaussdb/wal
tmp_path              = /data/gaussdb/tmp
port                  = 25308
pooler_port           = 25309
cm_server_port        = 25310
gtm_port              = 25311
encoding              = UTF8
locale                = zh_CN.UTF-8
max_connections       = 5000
shared_buffers_gb     = 64
wal_level             = hot_standby
max_wal_senders       = 16

; ========== FusionInsight Manager ==========
[FusionInsightManager]
version               = 9.1.0
install_path          = /opt/huawei/Bigdata/Manager
admin_user            = admin
db_user               = omm
ssh_port              = 22
web_port              = 20009

; ========== 资源管理 ==========
[Resource]
memory_limit_pct      = 80
cpu_affinity          = 0-95
io_nice               = 0
oom_score_adj         = -500

; ========== 安全配置 ==========
[Security]
selinux_mode          = disabled
firewall              = disabled
audit                 = disabled
ipv6                  = disabled
swap                  = disabled
thp                   = disabled
numa                  = enabled
